version: 2
project_name: clank

builds:
  - main: .
    binary: clank
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/clankhost/clank-cli/cmd.Version={{.Version}}
      - -X github.com/clankhost/clank-cli/cmd.Commit={{.ShortCommit}}
      - -X github.com/clankhost/clank-cli/cmd.Date={{.Date}}

archives:
  - format: tar.gz
    name_template: "clank_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
